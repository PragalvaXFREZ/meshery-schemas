name: Schema Audit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/schema-audit.yml'
      - 'Makefile'
      - 'build/**'
      - 'validation/**'
      - 'cmd/validate-schemas/**'
      - 'schemas/**'
      - 'go.mod'
      - 'go.sum'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/schema-audit.yml'
      - 'Makefile'
      - 'build/**'
      - 'validation/**'
      - 'cmd/validate-schemas/**'
      - 'schemas/**'
      - 'go.mod'
      - 'go.sum'

jobs:
  strict-consistency-audit:
    name: Strict schema consistency audit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run strict schema consistency audit
        run: make validate-schemas-strict

  advisory-audit:
    name: Full schema audit
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run full schema audit
        run: make audit-schemas-full
