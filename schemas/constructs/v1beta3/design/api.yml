openapi: 3.0.0
info:
  title: Design
  description: OpenAPI schema for managing Meshery designs and infrastructure patterns.
  version: v1beta3
  contact:
    name: Meshery Maintainers
    email: maintainers@meshery.io
    url: https://meshery.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

security:
  - jwt: []
tags:
  - name: designs
    description: Operations related to designs and infrastructure patterns
paths:
  /api/content/patterns:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get designs
      operationId: getPatterns
      description: Returns a paginated list of infrastructure designs accessible to the user.
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - $ref: "#/components/parameters/orgIdQuery"
        - name: visibility
          in: query
          description: Filter by visibility (public, private, published)
          schema:
            type: string
        - name: userId
          in: query
          required: false
          description: UUID of User. Pass userId for fetching public and published designs.
          schema:
            type: string
            format: uuid
        - name: metrics
          in: query
          required: false
          description: Whether to include usage metrics in the response.
          schema:
            type: boolean
        - name: workspaceId
          in: query
          required: false
          description: Filter designs by workspace ID.
          schema:
            type: string
            format: uuid
        - name: populate
          in: query
          required: false
          description: Populate additional nested fields in the response.
          schema:
            type: boolean
        - name: shared
          in: query
          required: false
          description: Include designs shared with the caller.
          schema:
            type: boolean
      responses:
        "200":
          description: Designs response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPatternPage"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Save design
      operationId: upsertPattern
      description: Creates or updates an infrastructure design.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MesheryPatternRequestBody"
      responses:
        "200":
          description: Design saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPattern"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/delete:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Bulk delete designs
      operationId: deletePatterns
      description: Deletes multiple designs by ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MesheryPatternDeleteRequestBody"
      responses:
        "200":
          description: Designs deleted
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/resource:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get pattern resources
      operationId: getPatternResources
      description: Returns pattern resource definitions.
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
      responses:
        "200":
          description: Pattern resources response
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Save pattern resource
      operationId: upsertPatternResource
      description: Creates or updates a pattern resource definition.
      responses:
        "200":
          description: Pattern resource saved
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/resource/{designId}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get pattern resource by ID
      operationId: getPatternResource
      parameters:
        - $ref: "#/components/parameters/designId"
      responses:
        "200":
          description: Pattern resource response
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Delete pattern resource
      operationId: deletePatternResource
      parameters:
        - $ref: "#/components/parameters/designId"
      responses:
        "204":
          description: Pattern resource deleted
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/{designId}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get design by ID
      operationId: getPattern
      parameters:
        - $ref: "#/components/parameters/designId"
      responses:
        "200":
          description: Design response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPattern"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    delete:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Delete design by ID
      operationId: deletePattern
      parameters:
        - $ref: "#/components/parameters/designId"
      responses:
        "204":
          description: Design deleted
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/clone/{designId}:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Clone design
      operationId: clonePattern
      description: Creates a copy of an existing design.
      parameters:
        - $ref: "#/components/parameters/designId"
      responses:
        "200":
          description: Design cloned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryPattern"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/download/{designId}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Download design file
      operationId: getDesignPatternFile
      description: Downloads the raw design file for the specified design.
      parameters:
        - $ref: "#/components/parameters/designId"
      responses:
        "200":
          description: Design file content
          content:
            application/yaml:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/patterns/upload/{designId}:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Upload design source content
      operationId: upsertPatternSourceContent
      description: |
        Replaces the raw source content blob stored alongside a design.
        The server (meshery-cloud's UpsertPatternSourceContent handler)
        reads the entire request body as opaque bytes via io.ReadAll and
        persists them without interpretation, so the content-type is
        whatever the uploader sent — `application/octet-stream` is the
        canonical choice. The previous declaration reused
        MesheryPatternImportRequestBody under multipart/form-data, which
        the handler never parses; it remained wired up solely to share
        a schema ref with /api/pattern/import. See meshery/schemas#771
        for the drift analysis.
      parameters:
        - $ref: "#/components/parameters/designId"
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              description: Opaque design source bytes (yaml, tarball, etc.)
      responses:
        "200":
          description: Design source content uploaded
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/pattern/import:
    post:
      x-internal: ["cloud", "meshery"]
      tags:
        - designs
      summary: Import Design
      operationId: importDesign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MesheryPatternImportRequestBody"
      responses:
        "200":
          description: Successful Import
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          description: Invalid request format
        "401":
          $ref: "#/components/responses/401"
        "500":
          description: Internal server error

  /api/catalog/content/{type}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get catalog content
      operationId: getCatalogContent
      security: []
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: technology
          in: query
          required: false
          schema:
            type: string
        - name: metrics
          in: query
          required: false
          schema:
            type: boolean
        - name: class
          in: query
          required: false
          schema:
            type: string
        - name: userId
          in: query
          required: false
          schema:
            type: string
        - name: orgId
          in: query
          required: false
          schema:
            type: string
        - name: workspaceId
          in: query
          required: false
          schema:
            type: string
        - name: teamId
          in: query
          required: false
          schema:
            type: string
        - name: populate
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Catalog content page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogContentPage"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Publish catalog content
      operationId: publishCatalogContent
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/catalogContentPayload"
      responses:
        "200":
          description: Catalog request result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogRequest"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "409":
          description: Conflict
        "500":
          $ref: "#/components/responses/500"
  /api/catalog/content/{type}/unpublish:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Unpublish catalog content
      operationId: unPublishCatalogContent
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/catalogContentPayload"
      responses:
        "200":
          description: Catalog request result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogRequest"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "409":
          description: Conflict
        "500":
          $ref: "#/components/responses/500"

  /api/catalog/content/classes:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get catalog content classes
      operationId: getCatalogContentClasses
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: Catalog content classes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CatalogContentClass"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"

  /api/catalog/requests/approve:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Approve a catalog request
      operationId: approveCatalogRequest
      requestBody:
        $ref: "#/components/requestBodies/catalogContentPayload"
      responses:
        "200":
          description: Request approved
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "409":
          description: Conflict
        "500":
          $ref: "#/components/responses/500"

  /api/catalog/requests/deny:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Deny a catalog request
      operationId: denyCatalogRequest
      requestBody:
        $ref: "#/components/requestBodies/catalogContentPayload"
      responses:
        "200":
          description: Request denied
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "409":
          description: Conflict
        "500":
          $ref: "#/components/responses/500"

  /api/content/filters/{filterId}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get filter by ID
      operationId: getFilter
      parameters:
        - $ref: "#/components/parameters/filterId"
      responses:
        "200":
          description: Filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryFilter"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/filters/clone/{filterId}:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Clone filter
      operationId: cloneFilter
      parameters:
        - $ref: "#/components/parameters/filterId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Cloned filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MesheryFilter"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/resource/{resourceType}/share/{resourceId}:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Share a resource
      operationId: handleResourceShare
      parameters:
        - name: resourceType
          in: path
          required: true
          schema:
            type: string
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        $ref: "#/components/requestBodies/resourceSharePayload"
      responses:
        "200":
          description: Resource access mapping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceAccessMapping"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/resource/{resourceType}/share/{resourceId}/{actorType}:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get resource access actors by type
      operationId: getResourceAccessActorsByType
      parameters:
        - name: resourceType
          in: path
          required: true
          schema:
            type: string
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
        - name: actorType
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resource access actors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceAccessActorsResponse"
        "401":
          $ref: "#/components/responses/401"
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/content/design/share:
    post:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Share a design, view, or filter by email
      operationId: shareDesign
      description: |
        Shares a design (pattern), view, or filter with a list of email
        addresses. When `share` is true, the content's visibility is flipped to
        public and an invitation email is sent to each recipient. When `share`
        is false, visibility is reverted to private. Only the owner of the
        content may change its sharing mode.
      requestBody:
        $ref: "#/components/requestBodies/contentSharePayload"
      responses:
        "200":
          description: Content shared.
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          description: Caller is not the owner of the content.
        "404":
          $ref: "#/components/responses/404"
        "500":
          $ref: "#/components/responses/500"

  /api/catalog/requests:
    get:
      x-internal: ["cloud"]
      tags:
        - designs
      summary: Get catalog requests
      operationId: getCatalogRequest
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/search"
        - $ref: "#/components/parameters/order"
        - name: filter
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Catalog requests page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogRequestsPage"
        "401":
          $ref: "#/components/responses/401"
        "500":
          $ref: "#/components/responses/500"
components:
  securitySchemes:
    jwt:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    400:
      $ref: "../../v1beta2/core/api.yml#/components/responses/400"
    401:
      $ref: "../../v1beta2/core/api.yml#/components/responses/401"
    404:
      $ref: "../../v1beta2/core/api.yml#/components/responses/404"
    500:
      $ref: "../../v1beta2/core/api.yml#/components/responses/500"

  parameters:
    designId:
      name: designId
      in: path
      description: Design (Pattern) ID
      required: true
      schema:
        $ref: "../../v1beta2/core/api.yml#/components/schemas/Uuid"
    page:
      $ref: "../../v1beta2/core/api.yml#/components/parameters/page"
    pageSize:
      name: pageSize
      in: query
      description: Number of items per page (canonical camelCase form).
      schema:
        type: integer
        minimum: 1
    search:
      $ref: "../../v1beta2/core/api.yml#/components/parameters/search"
    order:
      $ref: "../../v1beta2/core/api.yml#/components/parameters/order"
    orgIdQuery:
      name: orgId
      in: query
      description: User's organization ID
      schema:
        type: string
        format: uuid
    filterId:
      name: filterId
      in: path
      description: Filter ID
      required: true
      schema:
        $ref: "../../v1beta2/core/api.yml#/components/schemas/Uuid"

  schemas:
    DeletePatternModel:
      type: object
      description: Reference to a design for bulk deletion by ID.
      properties:
        id:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Id"
          description: Design ID targeted for deletion.
        name:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Text"
          description: Human-readable design name (informational only; server matches on id).

    PatternFile:
      $ref: "./design.yaml"

    MesheryPattern:
      type: object
      description: Server-returned design (pattern) resource as persisted by meshery-cloud.
      properties:
        id:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Id"
          description: Server-generated design ID.
        name:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Text"
          description: Human-readable design name.
        catalogData:
          $ref: "../../v1beta2/catalog/api.yml#/components/schemas/CatalogData"
          description: Catalog metadata attached to the design when published.
          x-go-type: catalogv1alpha2.CatalogData
          x-go-type-import:
            path: github.com/meshery/schemas/models/v1alpha2/catalog
            name: catalogv1alpha2
        userId:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Id"
          description: Owning user ID.
          x-oapi-codegen-extra-tags:
            db: user_id
        location:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/MapObject"
          description: Optional structured location metadata (branch, host, path, ...).
        patternFile:
          $ref: "#/components/schemas/PatternFile"
          description: Parsed design document body.
          x-go-type: PatternFile
          x-oapi-codegen-extra-tags:
            db: pattern_file
        visibility:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Text"
          description: Visibility scope (private, public, published).
        createdAt:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Time"
          description: Timestamp of design creation.
          x-oapi-codegen-extra-tags:
            db: created_at
        updatedAt:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Time"
          description: Timestamp of last design modification.
          x-oapi-codegen-extra-tags:
            db: updated_at

    MesheryPatternPage:
      type: object
      description: Paginated collection of designs.
      properties:
        page:
          type: integer
          description: Current page number of the result set.
          minimum: 0
        pageSize:
          type: integer
          description: Number of items per page.
          minimum: 1
        totalCount:
          type: integer
          description: Total number of items available.
          minimum: 0
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/MesheryPattern"
            x-go-type: MesheryPattern
          description: Designs included on this page of results.
        resultType:
          type: string
          description: Optional discriminator describing which collection the page represents.
          maxLength: 500

    MesheryPatternDeleteRequestBody:
      type: object
      description: Payload for bulk deleting designs by ID.
      properties:
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/DeletePatternModel"
            x-go-type: DeletePatternModel
          description: Designs targeted for deletion.

    MesheryPatternRequestBody:
      type: object
      description: Payload for upserting a design via POST /api/content/patterns.
      properties:
        path:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Text"
          description: Optional source path the design was loaded from.
        patternData:
          $ref: "#/components/schemas/MesheryPattern"
          description: Design body to persist.
          x-go-type: MesheryPattern
        save:
          type: boolean
          description: When true, persist the design in addition to parsing it.
        url:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Endpoint"
          description: Optional source URL the design was fetched from.
        name:
          type: string
          description: Human-readable design name.
          minLength: 1
          maxLength: 255

    MesheryPatternImportRequestBody:
      description: "Body for POST /api/pattern/import. Consumed by the server as application/json. Exactly one of two variants must be supplied: a File Import carrying base64-encoded bytes plus a file name, or a URL Import naming a remote location the server will fetch. Sending both variants at once, or neither, is rejected with 400."
      oneOf:
        - $ref: "#/components/schemas/MesheryPatternImportFilePayload"
        - $ref: "#/components/schemas/MesheryPatternImportURLPayload"

    MesheryPatternImportFilePayload:
      type: object
      title: File Import
      description: "Upload a design file from the local system. Both `file` and `fileName` are required; the server uses the file name to identify the file type (Kubernetes Manifest, Helm Chart, Docker Compose, or Meshery Design)."
      required: [file, fileName]
      properties:
        file:
          type: string
          format: byte
          description: "Base64-encoded file bytes. Supported formats: Kubernetes Manifests, Helm Charts, Docker Compose, and Meshery Designs. See [Import Designs Documentation](https://docs.meshery.io/guides/configuration-management/importing-designs#import-designs-using-meshery-ui) for details."
        fileName:
          type: string
          description: "The name of the pattern file being imported. Include the extension (e.g. `design.yaml`), as the server uses it to identify the file type."
          maxLength: 500
        name:
          type: string
          default: "Untitled Design"
          description: "Provide a name for your design. This name will help you identify the design later. You can also change the name of your design after importing it."
          minLength: 1
          maxLength: 255

    MesheryPatternImportURLPayload:
      type: object
      title: URL Import
      description: "Import a design by URL. The server will fetch the resource and derive the file type from the response."
      required: [url]
      properties:
        url:
          type: string
          format: uri
          description: "A direct URL to a single file, for example: https://raw.github.com/your-design-file.yaml. Ensure the resource is in a supported format: Kubernetes Manifest, Helm Chart, Docker Compose, or Meshery Design. See [Import Designs Documentation](https://docs.meshery.io/guides/configuration-management/importing-designs#import-designs-using-meshery-ui) for details."
        name:
          type: string
          default: "Untitled Design"
          description: "Provide a name for your design. This name will help you identify the design later. You can also change the name of your design after importing it."
          minLength: 1
          maxLength: 255

    DesignPreferences:
      type: object
      description: Design-level preferences
      x-order: 7
      properties:
        layers:
          type: object
          description: Map of available layers, where keys are layer names.
      required:
        - layers

    CatalogContentItem:
      type: object
      additionalProperties: true

    CatalogContentPage:
      type: object
      description: Paginated catalog content listing (designs, filters, aggregate counts).
      properties:
        page:
          type: integer
          description: Current page number of the result set.
          minimum: 0
        pageSize:
          type: integer
          description: Number of items per page.
          minimum: 1
        totalCount:
          type: integer
          description: Total number of items available.
          minimum: 0
        patterns:
          type: array
          items:
            $ref: "#/components/schemas/MesheryPattern"
          description: Published designs included on this page.
        filters:
          type: array
          items:
            $ref: "#/components/schemas/MesheryFilter"
          description: Published filters included on this page.
        modelsCount:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Model-by-count aggregates for the catalog page.
        categoryCount:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Category-by-count aggregates for the catalog page.

    CatalogRequest:
      type: object
      additionalProperties: true

    CatalogRequestsPage:
      type: object
      description: Paginated catalog-request listing (pending publish approvals).
      properties:
        page:
          type: integer
          description: Current page number of the result set.
          minimum: 0
        pageSize:
          type: integer
          description: Number of items per page.
          minimum: 1
        totalCount:
          type: integer
          description: Total number of items available.
          minimum: 0
        catalogRequests:
          type: array
          items:
            $ref: "#/components/schemas/CatalogRequest"
          description: Catalog requests included on this page.

    CatalogContentClass:
      type: object
      properties:
        class:
          type: string
          description: The class of the catalogcontentclass.
          maxLength: 500
        description:
          type: string
          description: Description of the catalogcontentclass.
          maxLength: 5000
      additionalProperties: true

    MesheryFilter:
      type: object
      additionalProperties: true

    ResourceAccessMapping:
      type: object
      additionalProperties: true

    ResourceAccessActorsResponse:
      type: object
      properties:
        users:
          type: array
          items:
            type: object
            additionalProperties: true
          description: The users of the resourceaccessactorsresponse.

    ContentSharePayload:
      type: object
      description: |
        Payload for sharing a piece of content (design, filter, or view) with one
        or more recipients by email. This schema backs both
        `POST /api/content/design/share` and `POST /api/content/view/share`; the
        server dispatches on `contentType` to decide which entity to mutate.
      required:
        - contentId
        - contentType
        - emails
        - share
      properties:
        contentId:
          $ref: "../../v1beta2/core/api.yml#/components/schemas/Uuid"
          description: Identifier of the content being shared (design, filter, or view).
        contentType:
          type: string
          description: |
            The kind of content being shared. Must match the entity the handler
            expects — `pattern` and `filter` are valid on the design share
            endpoint; `view` is valid on the view share endpoint.
          enum:
            - pattern
            - filter
            - view
        emails:
          type: array
          description: Email addresses of the recipients to share this content with.
          items:
            type: string
            format: email
        share:
          type: boolean
          description: |
            When true, flip visibility to public and send invitation emails to
            the recipients. When false, revert visibility to private.

  requestBodies:
    catalogContentPayload:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    resourceSharePayload:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    contentSharePayload:
      description: Body for sharing a design, filter, or view with recipients by email.
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ContentSharePayload"
